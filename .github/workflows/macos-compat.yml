name: macOS Compatibility

on:
  push:
    branches:
      - main
    paths:
      - 'electron-builder.yml'
      - 'build/entitlements.mac.plist'
      - 'scripts/verify-macos-artifact.mjs'
      - '.github/workflows/macos-compat.yml'
      - '.github/workflows/release.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
  pull_request:
    paths:
      - 'electron-builder.yml'
      - 'build/entitlements.mac.plist'
      - 'scripts/verify-macos-artifact.mjs'
      - '.github/workflows/macos-compat.yml'
      - '.github/workflows/release.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run typecheck && npx electron-vite build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Package macOS universal DMG
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify macOS artifact
        run: node scripts/verify-macos-artifact.mjs
